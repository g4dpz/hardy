name: LTP Unit Tests

on:
  push:
    branches: ["main"]
    paths:
      - "ltp/**"
      - "ltp-cla/**"
      - "async/**"
      - "bpa/**"
      - "bpv7/**"
      - "cbor/**"
      - "eid-patterns/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ltp-tests.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ltp/**"
      - "ltp-cla/**"
      - "async/**"
      - "bpa/**"
      - "bpv7/**"
      - "cbor/**"
      - "eid-patterns/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ltp-tests.yml"

permissions:
  contents: read

concurrency:
  group: ltp-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ltp

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check --manifest-path ltp/Cargo.toml && cargo fmt --check --manifest-path ltp-cla/Cargo.toml

      - name: Clippy
        run: cargo clippy -p hardy-ltp -p hardy-ltp-cla --all-targets -- -D warnings

      - name: Run hardy-ltp unit tests
        run: cargo test -p hardy-ltp --locked --verbose

      - name: Run hardy-ltp-cla unit tests
        run: cargo test -p hardy-ltp-cla --locked --verbose
